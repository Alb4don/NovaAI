[tool.ruff]
target-version = "py310"
line-length = 100
include = ["chatbot.py"]

[tool.ruff.lint]
select = [
    "E",    
    "W",    
    "F",    
    "I",    
    "N",    
    "S",    
    "B",    
    "A",    
    "C4",   
    "T20",  
    "SIM",  
    "RUF",  
]
ignore = [
    "S101",  
    "T201", 
]

[tool.ruff.lint.per-file-ignores]
"chatbot.py" = [
    "N802",  
    "N803",  
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pyright]
pythonVersion = "3.10"
pythonPlatform = "All"
typeCheckingMode = "strict"
reportMissingModuleSource = false
include = ["chatbot.py"]

[tool.bandit]
targets = ["chatbot.py"]
severity = "MEDIUM"
confidence = "MEDIUM"
skips = []
